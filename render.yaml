services:
  - type: web
    name: diverseway-clinic
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CANONICAL_HOST
        value: www.diversewayclinic.com
      - key: SITE_URL
        value: https://www.diversewayclinic.com
      - key: ADMIN_API_KEY
        sync: false
    # Optional: attach a persistent disk on Render (paid) so bookings survive redeploys
    # disk:
    #   name: clinic-data
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
