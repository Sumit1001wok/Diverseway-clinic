<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Diverse Way Clinic</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="login-screen" class="admin-login">
    <form id="login-form" class="admin-login-card">
      <h1>Clinic Admin</h1>
      <p class="muted">Enter your admin API key to view bookings and messages.</p>
      <label class="field">
        <span>Admin API key</span>
        <input id="admin-key" type="password" autocomplete="current-password" required>
      </label>
      <button class="btn-primary" type="submit">Sign in</button>
      <p id="login-error" class="form-error" role="status"></p>
    </form>
  </div>

  <div id="dashboard" class="admin-dashboard hidden">
    <header class="admin-header">
      <div>
        <h1>Diverse Way Clinic</h1>
        <p class="muted">Bookings &amp; contact inbox</p>
      </div>
      <button id="logout-btn" class="btn-outline" type="button">Sign out</button>
    </header>

    <div class="admin-stats" id="admin-stats"></div>

    <section class="admin-panel">
      <h2>Appointment requests</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Service</th>
              <th>Preferred</th>
              <th>Status</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="bookings-body"></tbody>
        </table>
      </div>
    </section>

    <section class="admin-panel">
      <h2>Contact messages</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Email</th>
              <th>Subject</th>
              <th>Message</th>
              <th>Read</th>
            </tr>
          </thead>
          <tbody id="messages-body"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
